<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Home Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/bootstrap.min.css">
  <link rel="stylesheet" href="/all.min.css">
  
  <style>
      *{
          margin: 0;
          padding: 0; 
      }
      .h1 {
  		font-size: 3rem;
  		font-weight: 700;
	  }
      .name {
  		font-size: 2.5rem;
  		font-weight: 700;
	  }
      .profile{
          border-radius: 50%;
          margin: 2% 30%;
      }

  </style>
</head>
<body class="bg-dark m-0 p-0 pb-5">
  <nav class="navbar navbar-expand-lg position-fixed top-0 w-100 bg-secondary">
  <div class="container">
    <a class="navbar-brand fw-bold text-dark fs-1" href="/info1">PERSONAL INFO</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto fs-3 fw-bolder">
        <li class="nav-item">
          <a class="nav-link active text-white" href="/about">AboutUs</a>
        </li>
        <li class="nav-iem">
          <a class="nav-link text-white" href="/index">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white" href="/contact">Contact</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="bg-light pt-5 mt-5 ps-4">
    <i class="fa-solid fa-users fa-5x text-dark"></i>
    <p class="text-secondary fs-4 m-0 p-0">Welcome to</p>
    <h1 class="text-secondary h1">Dominion University</h1> 
</div>

<div class="name text-primary text-center mt-2">
    Hii there, <%= name %>👋👋👋
</div>

<div class="card bg-light rounded-4 p-3 mx-4 mb-5 mt-4 text-primary">
    <img src="profile.png" class="profile" width="40%">
    <div class="d-flex my-3 align-items-center">
        <p class="fs-3 fw-bold">Reg No:</p><p class="bg-dark rounded-3 p-2 ms-2 fs-2 fw-bold"><%= pass %></p>
    </div>
    
    <div class="d-flex mb-3 align-items-center">
        <p class="fs-3 fw-bold">State of Origin:</p><p class="bg-dark rounded-3 p-2 ms-2 fs-2 fw-bold"><%= state %></p>
    </div>
    
    <div class="d-flex mt-3 align-items-center">
        <p class="fs-3 fw-bold">Location: </p><p class="bg-dark rounded-3 p-2 fs-2 ms-2 fw-bold"><%= address %></p>
    </div>
    
    <div class="d-flex mb-3 align-items-center">
        <p class="fs-3 fw-bold">Sex:</p><p class="bg-dark rounded-3 p-2 ms-2 fs-2 fw-bold">Male</p>
    </div>
</div>
  
  <script src="/bootstrap.bundle.min.js"></script>
</body>
</html>
